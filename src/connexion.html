<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — BATIPRO</title>
       <link rel="stylesheet" href="./output.css">
    <style>
        /* Left panel dark green gradient background */
        .panel-left {
            background: linear-gradient(155deg, #0b231f 0%, #0f3028 40%, #143d30 70%, #0b231f 100%);
        }

        /* Orange grid overlay — z:0 stays behind orbs */
        .panel-left::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(249,115,22,0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(249,115,22,0.07) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* Input styling with orange focus ring */
        .input-field {
            width: 100%;
            padding: 0.875rem 1rem;
            background: #f9f7f5;
            border: 1.5px solid #e8e3dd;
            border-radius: 12px;
            outline: none;
            font-size: 0.875rem;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-field:focus {
            border-color: #F97316;
            box-shadow: 0 0 0 3px rgba(249,115,22,0.12);
        }

        /* Submit button with hover and active states */
        .btn-submit {
            background: #F97316;
            transition: background 0.2s, transform 0.15s;
        }
        .btn-submit:hover  { background: #ea6c0e; }
        .btn-submit:active { transform: scale(0.98); }

        /* Fade-up entrance animation */
        .fade-up { animation: fadeUp 0.55s ease both; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body style="margin:0; padding:0; background:#f9f7f5; font-family:ui-sans-serif,system-ui,sans-serif;">

    <!-- Full-viewport flex wrapper — height:100vh ensures no gap at bottom -->
    <div style="display:flex; height:100vh; min-height:100vh; overflow:hidden;">

        <!-- ═══════════════════════════════════════
             LEFT PANEL — hidden on mobile, shown on desktop
        ═══════════════════════════════════════ -->
        <div class="panel-left hidden lg:block"
             style="width:50%; position:relative; display:none; flex-direction:column; align-items:center; justify-content:center; padding:3rem; overflow:hidden;">

            <!-- Orb 1 — bottom-left — bright teal for visibility against dark green bg -->
            <div style="
                position:absolute; bottom:0; left:0;
                width:300px; height:300px; border-radius:50%;
                background: #FDB515;
                transform:translate(-30%, 30%);
                z-index:1;
                pointer-events:none;">
            </div>

            <!-- Orb 2 — top-right — vivid orange glow -->
            <div style="
                position:absolute; top:0; right:0;
                width:300px; height:300px; border-radius:50%;
                transform:translate(30%, -30%);
                      background:  #F97316;
                z-index:1;
                pointer-events:none;">
            </div>

            <!-- Panel content — z:10 to float above orbs and grid -->
            <div style="position:relative; z-index:10; display:flex; flex-direction:column; align-items:center; text-align:center;">
                <img src="./assets/images/logo.png" alt="BATIPRO" style="width:11rem; margin-bottom:2rem;" />

                <h2 style="font-size:2.25rem; font-weight:700; color:#ffffff; line-height:1.3; font-style:italic; margin:0;">
                    Bienvenue sur <br />
                    <span style="color:#F97316;">BatiPro</span>
                </h2>

                <p style="color:rgba(255,255,255,0.65); margin-top:1.5rem; font-size:0.875rem; line-height:1.75; max-width:18rem;">
                    Donnez à vos clients la qualité qu'ils attendent : des devis pros et personnalisés générés en quelques clics.
                </p>
            </div>
        </div>

        <!-- ═══════════════════════════════════════
             RIGHT PANEL — login form
        ═══════════════════════════════════════ -->
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:2rem 4rem; background:#ffffff; position:relative; overflow-y:auto;">

            <!-- Back to site link -->
            <a href="./index.html" style="position:absolute; top:2rem; right:2rem; font-size:0.875rem; color:#b0a89e; display:flex; align-items:center; gap:0.5rem; text-decoration:none; transition:color 0.2s;"
               onmouseover="this.style.color='#F97316'" onmouseout="this.style.color='#b0a89e'">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Retour au site
            </a>

            <!-- Centered form content — max 400px -->
            <div style="width:100%; max-width:400px;">

                <!-- Heading section -->
                <div class="fade-up" style="margin-bottom:2.5rem;">
                    <h1 style="font-size:1.875rem; font-weight:700; color:#0b231f; margin:0 0 0.5rem; letter-spacing:-0.02em;">Bon retour</h1>
                    <p style="font-size:0.875rem; color:#8a8278; margin:0;">
                        Pas encore de compte ?
                        <a href="/inscription" style="color:#F97316; font-weight:600; text-decoration:none;"
                           onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">
                            Créer un compte gratuit
                        </a>
                    </p>
                </div>

                <!-- Form fields -->
                <div style="display:flex; flex-direction:column; gap:1.25rem;">

                    <!-- Email field -->
                    <div class="fade-up" style="animation-delay:0.1s;">
                        <label style="display:block; font-size:0.7rem; font-weight:700; color:#4a4540; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.5rem;">
                            Adresse email
                        </label>
                        <input type="email" class="input-field" placeholder="exemple@email.com">
                    </div>

                    <!-- Password field with toggle -->
                    <div class="fade-up" style="animation-delay:0.2s;">
                        <label style="display:block; font-size:0.7rem; font-weight:700; color:#4a4540; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.5rem;">
                            Mot de passe
                        </label>
                        <div style="position:relative;">
                            <input type="password" id="password-input" class="input-field" style="padding-right:3rem;" placeholder="••••••••">
                            <!-- Eye button to toggle visibility -->
                            <button type="button" onclick="togglePassword()"
                                    style="position:absolute; right:1rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#b0a89e; padding:0; line-height:0; transition:color 0.2s;"
                                    onmouseover="this.style.color='#F97316'" onmouseout="this.style.color='#b0a89e'">
                                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                            </button>
                        </div>
                        <div style="text-align:right; margin-top:0.5rem;">
                            <a href="#" style="font-size:0.75rem; color:#b0a89e; text-decoration:none; transition:color 0.2s;"
                               onmouseover="this.style.color='#F97316'" onmouseout="this.style.color='#b0a89e'">
                                Mot de passe oublié ?
                            </a>
                        </div>
                    </div>

                    <!-- Submit button -->
                    <button type="submit" class="btn-submit fade-up"
                            style="animation-delay:0.3s; width:100%; padding:1rem; border-radius:0.75rem; border:none; color:#fff; font-weight:700; font-size:0.875rem; cursor:pointer; box-shadow:0 8px 24px rgba(249,115,22,0.28);">
                        Se connecter →
                    </button>
                </div>

                <!-- OR divider -->
                <div class="fade-up" style="animation-delay:0.4s; display:flex; align-items:center; margin:2rem 0;">
                    <div style="flex:1; height:1px; background:#e8e3dd;"></div>
                    <span style="padding:0 1rem; font-size:0.7rem; color:#c8c0b8; text-transform:uppercase; letter-spacing:0.15em;">Ou</span>
                    <div style="flex:1; height:1px; background:#e8e3dd;"></div>
                </div>

                <!-- Google sign-in -->
                <button class="fade-up"
                        style="animation-delay:0.5s; width:100%; padding:0.75rem 1rem; border-radius:0.75rem; border:2px solid #e8e3dd; background:#fff; display:flex; align-items:center; justify-content:center; gap:0.75rem; font-size:0.875rem; font-weight:500; cursor:pointer; transition:border-color 0.2s;"
                        onmouseover="this.style.borderColor='#F97316'" onmouseout="this.style.borderColor='#e8e3dd'">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" style="width:1.25rem; height:1.25rem;" alt="Google">
                    Continuer avec Google
                </button>

            </div>
        </div>
    </div>

    <script>
        /* Toggle password field between hidden and visible */
        function togglePassword() {
            const input = document.getElementById('password-input');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        /* Apply flex display to left panel — lg:block from Tailwind doesn't set flex-direction */
        function applyLeftPanelLayout() {
            const panel = document.querySelector('.panel-left');
            if (!panel) return;
            if (window.innerWidth >= 1024) {
                panel.style.display = 'flex';
            } else {
                panel.style.display = 'none';
            }
        }
        applyLeftPanelLayout();
        window.addEventListener('resize', applyLeftPanelLayout);
    </script>
</body>
</html>
